version: "3.9"

services:

  # ── Main application ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - JWT_SECRET=${JWT_SECRET}
      - GPTCACHE_URL=http://gptcache:8000
      - RIVAL_URL=http://rival-service:8002
      - MONGODB_URI=mongodb://host.docker.internal:27017
      - POSTGRES_DSN=postgresql://postgres:postgres@postgres:5432/policy_bot
      - MONGO_DB=policy_bot
      - MONGO_COLLECTION=trees
      - POLICY_DOC_NAME=policy_dc
    depends_on:
      rival-service:
        condition: service_healthy
      gptcache:
        condition: service_started
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Attack detection microservice (Groq-backed) ─────────────────────────────
  rival-service:
    build:
      context: ./services/rival_service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  # ── GPTCache semantic cache server ──────────────────────────────────────────
  gptcache:
    image: zilliz/gptcache:latest
    ports:
      - "8001:8000"
    volumes:
      - gptcache_data:/data
    restart: unless-stopped

  # ── PostgreSQL — LangGraph session checkpointer ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: policy_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pg_data:
  gptcache_data:
